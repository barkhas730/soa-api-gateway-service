server.port=${SERVER_PORT:8080}
spring.application.name=api-gateway-service

spring.cloud.gateway.httpclient.connect-timeout=5000
spring.cloud.gateway.httpclient.response-timeout=10s

# Backend URLs
service.json.url=${JSON_SERVICE_URL:http://localhost:8082}
service.soap.url=${SOAP_SERVICE_URL:http://localhost:8081}
service.file.url=${FILE_SERVICE_URL:http://localhost:8083}
service.email.url=${EMAIL_SERVICE_URL:http://localhost:8084}
service.auth.url=${AUTH_SERVICE_URL:http://localhost:8082}

# Routes
spring.cloud.gateway.routes[0].id=json-service
spring.cloud.gateway.routes[0].uri=${service.json.url}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/api/users/(?<segment>.*), /users/${segment}

spring.cloud.gateway.routes[1].id=soap-service
spring.cloud.gateway.routes[1].uri=${service.soap.url}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/soap/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/api/soap/(?<segment>.*), /${segment}

spring.cloud.gateway.routes[2].id=file-service
spring.cloud.gateway.routes[2].uri=${service.file.url}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/files/**
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/api/files/(?<segment>.*), /files/${segment}

spring.cloud.gateway.routes[3].id=email-service
spring.cloud.gateway.routes[3].uri=${service.email.url}
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/email/**

spring.cloud.gateway.routes[4].id=auth-service
spring.cloud.gateway.routes[4].uri=${service.auth.url}
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/api/auth/(?<segment>.*), /auth/${segment}

# Redis (for next step caching)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
gateway.cache.ttl-seconds=${CACHE_TTL_SECONDS:60}
